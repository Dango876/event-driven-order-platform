name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-check-test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Checkstyle
        run: >
          mvn -B -ntp -U checkstyle:check
          -Dcheckstyle.config.location=checkstyle.xml
          -Dcheckstyle.consoleOutput=true
          -Dcheckstyle.failOnViolation=true

      - name: Unit/Integration Tests
        run: mvn -B -ntp -U test

      - name: JaCoCo report (order-service)
        run: >
          mvn -B -ntp -U
          -pl services/order-service -am
          org.jacoco:jacoco-maven-plugin:0.8.12:prepare-agent
          test
          org.jacoco:jacoco-maven-plugin:0.8.12:report

      - name: Coverage gate (>= 80%)
        shell: bash
        run: |
          CSV="services/order-service/target/site/jacoco/jacoco.csv"
          if [ ! -f "$CSV" ]; then
            echo "jacoco.csv not found: $CSV"
            exit 1
          fi

          COVERAGE=$(awk -F',' '
            NR > 1 {
              missed += $4
              covered += $5
            }
            END {
              total = missed + covered
              if (total == 0) {
                print "0.00"
              } else {
                printf "%.2f", (covered / total) * 100
              }
            }
          ' "$CSV")

          echo "Instruction coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { exit (c >= 80.0 ? 0 : 1) }'

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-artifacts
          path: |
            **/target/surefire-reports/*.xml
            services/order-service/target/site/jacoco/**
