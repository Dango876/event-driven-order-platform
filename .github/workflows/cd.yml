name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - inventory-service
          - order-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image owner (lowercase for GHCR)
        id: vars
        shell: bash
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_owner }}/edop-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_owner }}/edop-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-dev:
    if: ${{ secrets.KUBE_CONFIG_DEV != '' }}
    needs: build-and-push-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image owner (lowercase for GHCR)
        id: vars
        shell: bash
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Configure kubeconfig (dev)
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG_DEV }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm release to dev namespace
        shell: bash
        run: |
          helm upgrade --install edop ./infra/helm/edop \
            --namespace edop-dev \
            --create-namespace \
            -f ./infra/helm/edop/values.yaml \
            -f ./infra/helm/values/dev.yaml \
            --set-string applications[0].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-auth-service:${IMAGE_TAG} \
            --set-string applications[1].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-user-service:${IMAGE_TAG} \
            --set-string applications[2].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-product-service:${IMAGE_TAG} \
            --set-string applications[3].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-inventory-service:${IMAGE_TAG} \
            --set-string applications[4].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-order-service:${IMAGE_TAG} \
            --set-string applications[5].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-notification-service:${IMAGE_TAG} \
            --set-string applications[6].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-api-gateway:${IMAGE_TAG} \
            --wait \
            --timeout 15m

      - name: Show dev workloads
        run: kubectl get pods -n edop-dev -o wide

  deploy-prod:
    if: ${{ secrets.KUBE_CONFIG_PROD != '' }}
    needs: deploy-dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image owner (lowercase for GHCR)
        id: vars
        shell: bash
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Configure kubeconfig (prod)
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG_PROD }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm release to prod namespace
        shell: bash
        run: |
          helm upgrade --install edop ./infra/helm/edop \
            --namespace edop-prod \
            --create-namespace \
            -f ./infra/helm/edop/values.yaml \
            --set-string applications[0].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-auth-service:${IMAGE_TAG} \
            --set-string applications[1].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-user-service:${IMAGE_TAG} \
            --set-string applications[2].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-product-service:${IMAGE_TAG} \
            --set-string applications[3].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-inventory-service:${IMAGE_TAG} \
            --set-string applications[4].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-order-service:${IMAGE_TAG} \
            --set-string applications[5].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-notification-service:${IMAGE_TAG} \
            --set-string applications[6].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-api-gateway:${IMAGE_TAG} \
            --wait \
            --timeout 15m

      - name: Show prod workloads
        run: kubectl get pods -n edop-prod -o wide
