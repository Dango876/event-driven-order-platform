name: CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  detect-deploy-targets:
    runs-on: ubuntu-latest
    outputs:
      has_dev: ${{ steps.flags.outputs.has_dev }}
      has_dev_tls: ${{ steps.flags.outputs.has_dev_tls }}
      has_prod: ${{ steps.flags.outputs.has_prod }}
      has_prod_tls: ${{ steps.flags.outputs.has_prod_tls }}

    steps:
      - name: Detect available deployment secrets
        id: flags
        shell: bash
        env:
          KUBE_CONFIG_DEV: ${{ secrets.KUBE_CONFIG_DEV }}
          TLS_CERT_PEM_DEV: ${{ secrets.TLS_CERT_PEM_DEV }}
          TLS_KEY_PEM_DEV: ${{ secrets.TLS_KEY_PEM_DEV }}
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}
          TLS_CERT_PEM_PROD: ${{ secrets.TLS_CERT_PEM_PROD }}
          TLS_KEY_PEM_PROD: ${{ secrets.TLS_KEY_PEM_PROD }}
        run: |
          if [ -n "$KUBE_CONFIG_DEV" ]; then
            echo "has_dev=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dev=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$TLS_CERT_PEM_DEV" ] && [ -n "$TLS_KEY_PEM_DEV" ]; then
            echo "has_dev_tls=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dev_tls=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$KUBE_CONFIG_PROD" ]; then
            echo "has_prod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prod=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$TLS_CERT_PEM_PROD" ] && [ -n "$TLS_KEY_PEM_PROD" ]; then
            echo "has_prod_tls=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prod_tls=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - inventory-service
          - order-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image owner (lowercase for GHCR)
        id: vars
        shell: bash
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub (for BuildKit image pulls)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_owner }}/edop-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_owner }}/edop-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-dev:
    if: ${{ needs.detect-deploy-targets.outputs.has_dev == 'true' }}
    needs:
      - detect-deploy-targets
      - build-and-push-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image owner (lowercase for GHCR)
        id: vars
        shell: bash
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Configure kubeconfig (dev)
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG_DEV }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Upsert TLS secret (dev, optional)
        if: ${{ needs.detect-deploy-targets.outputs.has_dev_tls == 'true' }}
        shell: bash
        run: |
          cert_file="$(mktemp)"
          key_file="$(mktemp)"
          printf '%s' "${{ secrets.TLS_CERT_PEM_DEV }}" > "$cert_file"
          printf '%s' "${{ secrets.TLS_KEY_PEM_DEV }}" > "$key_file"
          kubectl -n edop-dev create secret tls edop-gateway-tls \
            --cert="$cert_file" \
            --key="$key_file" \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f "$cert_file" "$key_file"

      - name: Helm release to dev namespace
        shell: bash
        run: |
          helm upgrade --install edop ./infra/helm/edop \
            --namespace edop-dev \
            --create-namespace \
            -f ./infra/helm/edop/values.yaml \
            -f ./infra/helm/values/dev.yaml \
            --set-string applications[0].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-auth-service:${IMAGE_TAG} \
            --set-string applications[1].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-user-service:${IMAGE_TAG} \
            --set-string applications[2].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-product-service:${IMAGE_TAG} \
            --set-string applications[3].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-inventory-service:${IMAGE_TAG} \
            --set-string applications[4].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-order-service:${IMAGE_TAG} \
            --set-string applications[5].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-notification-service:${IMAGE_TAG} \
            --set-string applications[6].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-api-gateway:${IMAGE_TAG} \
            --wait \
            --timeout 15m

      - name: Show dev workloads
        run: kubectl get pods -n edop-dev -o wide

  deploy-prod:
    if: ${{ needs.detect-deploy-targets.outputs.has_prod == 'true' && (needs.detect-deploy-targets.outputs.has_dev != 'true' || needs.deploy-dev.result == 'success') }}
    needs:
      - detect-deploy-targets
      - build-and-push-images
      - deploy-dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image owner (lowercase for GHCR)
        id: vars
        shell: bash
        run: |
          echo "image_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Configure kubeconfig (prod)
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG_PROD }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Upsert TLS secret (prod, optional)
        if: ${{ needs.detect-deploy-targets.outputs.has_prod_tls == 'true' }}
        shell: bash
        run: |
          cert_file="$(mktemp)"
          key_file="$(mktemp)"
          printf '%s' "${{ secrets.TLS_CERT_PEM_PROD }}" > "$cert_file"
          printf '%s' "${{ secrets.TLS_KEY_PEM_PROD }}" > "$key_file"
          kubectl -n edop-prod create secret tls edop-gateway-tls \
            --cert="$cert_file" \
            --key="$key_file" \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f "$cert_file" "$key_file"

      - name: Helm release to prod namespace
        shell: bash
        run: |
          GATEWAY_HOST="${{ vars.PROD_GATEWAY_HOST }}"
          if [ -z "$GATEWAY_HOST" ]; then
            GATEWAY_HOST="edop.example.com"
          fi

          helm upgrade --install edop ./infra/helm/edop \
            --namespace edop-prod \
            --create-namespace \
            -f ./infra/helm/edop/values.yaml \
            --set ingress.enabled=true \
            --set ingress.tls.enabled=true \
            --set-string ingress.tls.secretName=edop-gateway-tls \
            --set-string ingress.host="$GATEWAY_HOST" \
            --set autoscalingDefaults.enabled=true \
            --set autoscalingDefaults.minReplicas=2 \
            --set autoscalingDefaults.maxReplicas=4 \
            --set pdbDefaults.enabled=true \
            --set-string applications[6].service.type=ClusterIP \
            --set applications[0].replicas=2 \
            --set applications[1].replicas=2 \
            --set applications[2].replicas=2 \
            --set applications[3].replicas=2 \
            --set applications[4].replicas=2 \
            --set applications[5].replicas=2 \
            --set applications[6].replicas=2 \
            --set-string applications[0].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-auth-service:${IMAGE_TAG} \
            --set-string applications[1].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-user-service:${IMAGE_TAG} \
            --set-string applications[2].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-product-service:${IMAGE_TAG} \
            --set-string applications[3].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-inventory-service:${IMAGE_TAG} \
            --set-string applications[4].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-order-service:${IMAGE_TAG} \
            --set-string applications[5].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-notification-service:${IMAGE_TAG} \
            --set-string applications[6].image=${REGISTRY}/${{ steps.vars.outputs.image_owner }}/edop-api-gateway:${IMAGE_TAG} \
            --wait \
            --timeout 15m

      - name: Show prod workloads
        run: kubectl get pods -n edop-prod -o wide
