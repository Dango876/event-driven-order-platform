server:
  port: 8084

spring:
  application:
    name: inventory-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/inventory_db}
    username: ${DB_USERNAME:inventory_user}
    password: ${DB_PASSWORD:inventory_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:inventory-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
      auto.register.schemas: true
      specific.avro.reader: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:500ms}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

app:
  kafka:
    topics:
      order-created: ${KAFKA_TOPIC_ORDER_CREATED:order.created}
      inventory-reserved: ${KAFKA_TOPIC_INVENTORY_RESERVED:inventory.reserved}
      inventory-reserve-failed: ${KAFKA_TOPIC_INVENTORY_RESERVE_FAILED:inventory.reserve-failed}

inventory:
  lock:
    enabled: ${INVENTORY_LOCK_ENABLED:true}
    fail-open: ${INVENTORY_LOCK_FAIL_OPEN:true}
    wait-timeout-ms: ${INVENTORY_LOCK_WAIT_TIMEOUT_MS:1200}
    lease-timeout-ms: ${INVENTORY_LOCK_LEASE_TIMEOUT_MS:5000}
    retry-delay-ms: ${INVENTORY_LOCK_RETRY_DELAY_MS:50}
    key-prefix: ${INVENTORY_LOCK_KEY_PREFIX:inventory:redlock:product:}
