spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth,/api/auth/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@remoteAddressKeyResolver}"

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@remoteAddressKeyResolver}"

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/products,/api/products/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@remoteAddressKeyResolver}"

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/inventory,/api/inventory/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@remoteAddressKeyResolver}"

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/orders,/api/orders/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@remoteAddressKeyResolver}"

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/notifications,/api/notifications/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redisRateLimiter}"
                key-resolver: "#{@remoteAddressKeyResolver}"

        - id: auth-service-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api-docs/auth
          filters:
            - SetPath=/v3/api-docs

        - id: user-service-docs
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api-docs/user
          filters:
            - SetPath=/v3/api-docs

        - id: product-service-docs
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api-docs/product
          filters:
            - SetPath=/v3/api-docs

        - id: inventory-service-docs
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api-docs/inventory
          filters:
            - SetPath=/v3/api-docs

        - id: order-service-docs
          uri: ${ORDER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api-docs/order
          filters:
            - SetPath=/v3/api-docs

        - id: notification-service-docs
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api-docs/notification
          filters:
            - SetPath=/v3/api-docs

        - id: auth-service-docs-yaml
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api-docs/auth.yaml
          filters:
            - SetPath=/v3/api-docs.yaml

        - id: user-service-docs-yaml
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api-docs/user.yaml
          filters:
            - SetPath=/v3/api-docs.yaml

        - id: product-service-docs-yaml
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api-docs/product.yaml
          filters:
            - SetPath=/v3/api-docs.yaml

        - id: inventory-service-docs-yaml
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api-docs/inventory.yaml
          filters:
            - SetPath=/v3/api-docs.yaml

        - id: order-service-docs-yaml
          uri: ${ORDER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api-docs/order.yaml
          filters:
            - SetPath=/v3/api-docs.yaml

        - id: notification-service-docs-yaml
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api-docs/notification.yaml
          filters:
            - SetPath=/v3/api-docs.yaml

product:
  grpc:
    host: ${PRODUCT_GRPC_HOST:127.0.0.1}
    port: ${PRODUCT_GRPC_PORT:9094}

