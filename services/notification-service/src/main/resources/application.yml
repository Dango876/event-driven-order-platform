server:
  port: 8087

spring:
  application:
    name: notification-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27018/notification_db}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
      specific.avro.reader: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

app:
  kafka:
    topics:
      user-created: ${KAFKA_TOPIC_USER_CREATED:user.created}
      order-created: ${KAFKA_TOPIC_ORDER_CREATED:order.created}
      order-status-changed: ${KAFKA_TOPIC_ORDER_STATUS_CHANGED:order.status-changed}

  notification:
    sender:
      from: ${NOTIFICATION_FROM:no-reply@procurehub.local}
    rate-limit:
      enabled: ${NOTIFICATION_RATE_LIMIT_ENABLED:true}
      capacity: ${NOTIFICATION_RATE_LIMIT_CAPACITY:20}
      leak-per-second: ${NOTIFICATION_RATE_LIMIT_LEAK_PER_SECOND:5}
      bucket-key-ttl-seconds: ${NOTIFICATION_RATE_LIMIT_BUCKET_TTL_SECONDS:3600}
      order-user-ttl-seconds: ${NOTIFICATION_RATE_LIMIT_ORDER_USER_TTL_SECONDS:604800}
      user-bucket-key-prefix: ${NOTIFICATION_RATE_LIMIT_USER_BUCKET_PREFIX:notification:bucket:user:}
      order-bucket-key-prefix: ${NOTIFICATION_RATE_LIMIT_ORDER_BUCKET_PREFIX:notification:bucket:order:}
      order-user-key-prefix: ${NOTIFICATION_RATE_LIMIT_ORDER_USER_PREFIX:notification:order-user:}
