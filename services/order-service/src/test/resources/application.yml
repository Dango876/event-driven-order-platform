spring:
  datasource:
    url: jdbc:h2:mem:order_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service-test
    listener:
      auto-startup: false

app:
  kafka:
    topics:
      order-created: order.created
      order-status-changed: order.status-changed
      inventory-reserved: inventory.reserved
      inventory-reserve-failed: inventory.reserve-failed

inventory:
  grpc:
    host: localhost
    port: 9091

