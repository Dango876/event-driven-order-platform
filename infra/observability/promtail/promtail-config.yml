server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: edop-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: edop-local
          stream: application
          __path__: /var/log/edop/*.app.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '.*/(?P<service>[^/]+)\.app\.log'
      - labels:
          service:
