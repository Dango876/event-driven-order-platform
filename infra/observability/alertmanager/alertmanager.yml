global:
  resolve_timeout: 5m

route:
  receiver: external-webhook
  group_by: ["alertname", "job", "severity"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
  - name: default
  - name: external-webhook
    webhook_configs:
      - url: __ALERT_WEBHOOK_URL__
        send_resolved: true
