global:
  imagePullPolicy: IfNotPresent

rolloutDefaults:
  enabled: true
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

resourcesDefaults:
  applications:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

autoscalingDefaults:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
      selectPolicy: Min
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

pdbDefaults:
  enabled: false
  minAvailable: 1

infrastructure:
  - name: redpanda
    enabled: true
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    replicas: 1
    strategy:
      type: Recreate
    command:
      - rpk
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    containerPorts:
      - name: kafka
        containerPort: 9092
      - name: admin
        containerPort: 9644
    service:
      type: ClusterIP
      ports:
        - name: kafka
          port: 9092
          targetPort: 9092
        - name: admin
          port: 9644
          targetPort: 9644
    probes:
      tcpPort: 9092

  - name: schema-registry
    enabled: true
    image: confluentinc/cp-schema-registry:7.6.1
    replicas: 1
    strategy:
      type: Recreate
    enableServiceLinks: false
    env:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://redpanda:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: "1"
      PORT: "8081"
    containerPorts:
      - name: http
        containerPort: 8081
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8081
          targetPort: 8081
    probes:
      httpPath: /
      httpPort: 8081

  - name: auth-postgres
    enabled: true
    image: postgres:15-alpine
    env:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    containerPorts:
      - name: pg
        containerPort: 5432
    service:
      type: ClusterIP
      ports:
        - name: pg
          port: 5432
          targetPort: 5432
    probes:
      tcpPort: 5432

  - name: user-postgres
    enabled: true
    image: postgres:15-alpine
    env:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    containerPorts:
      - name: pg
        containerPort: 5432
    service:
      type: ClusterIP
      ports:
        - name: pg
          port: 5432
          targetPort: 5432
    probes:
      tcpPort: 5432

  - name: inventory-postgres
    enabled: true
    image: postgres:15-alpine
    env:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    containerPorts:
      - name: pg
        containerPort: 5432
    service:
      type: ClusterIP
      ports:
        - name: pg
          port: 5432
          targetPort: 5432
    probes:
      tcpPort: 5432

  - name: order-postgres
    enabled: true
    image: postgres:15-alpine
    env:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    containerPorts:
      - name: pg
        containerPort: 5432
    service:
      type: ClusterIP
      ports:
        - name: pg
          port: 5432
          targetPort: 5432
    probes:
      tcpPort: 5432

  - name: mongodb
    enabled: true
    image: mongo:7
    containerPorts:
      - name: mongo
        containerPort: 27017
    service:
      type: ClusterIP
      ports:
        - name: mongo
          port: 27017
          targetPort: 27017
    probes:
      tcpPort: 27017

  - name: redis
    enabled: true
    image: redis:7-alpine
    containerPorts:
      - name: redis
        containerPort: 6379
    service:
      type: ClusterIP
      ports:
        - name: redis
          port: 6379
          targetPort: 6379
    probes:
      tcpPort: 6379

  - name: jaeger
    enabled: true
    image: jaegertracing/all-in-one:1.61.0
    containerPorts:
      - name: ui
        containerPort: 16686
      - name: otlp
        containerPort: 4317
    service:
      type: ClusterIP
      ports:
        - name: ui
          port: 16686
          targetPort: 16686
        - name: otlp
          port: 4317
          targetPort: 4317
    probes:
      httpPath: /
      httpPort: 16686

applications:
  - name: auth-service
    enabled: true
    image: edop/auth-service:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8081
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8081
          targetPort: 8081
    env:
      DB_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      AUTH_BASE_URL: http://auth-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    envFromSecrets:
      - name: auth-service
        optional: true
    probes:
      httpPath: /actuator/health
      httpPort: 8081

  - name: user-service
    enabled: true
    image: edop/user-service:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8082
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8082
          targetPort: 8082
    env:
      DB_URL: jdbc:postgresql://user-postgres:5432/user_db
      DB_USERNAME: user_user
      DB_PASSWORD: user_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    probes:
      httpPath: /actuator/health
      httpPort: 8082

  - name: product-service
    enabled: true
    image: edop/product-service:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8083
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8083
          targetPort: 8083
    env:
      MONGODB_URI: mongodb://mongodb:27017/product_db
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    probes:
      httpPath: /actuator/health
      httpPort: 8083

  - name: inventory-service
    enabled: true
    image: edop/inventory-service:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8084
      - name: grpc
        containerPort: 9091
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8084
          targetPort: 8084
        - name: grpc
          port: 9091
          targetPort: 9091
    env:
      DB_URL: jdbc:postgresql://inventory-postgres:5432/inventory_db
      DB_USERNAME: inventory_user
      DB_PASSWORD: inventory_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GRPC_SERVER_PORT: "9091"
      INVENTORY_LOCK_ENABLED: "true"
      INVENTORY_LOCK_FAIL_OPEN: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    probes:
      httpPath: /actuator/health
      httpPort: 8084

  - name: order-service
    enabled: true
    image: edop/order-service:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8086
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8086
          targetPort: 8086
    env:
      DB_URL: jdbc:postgresql://order-postgres:5432/order_db
      DB_USERNAME: order_user
      DB_PASSWORD: order_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      INVENTORY_GRPC_HOST: inventory-service
      INVENTORY_GRPC_PORT: "9091"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    probes:
      httpPath: /actuator/health
      httpPort: 8086

  - name: notification-service
    enabled: true
    image: edop/notification-service:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8087
    service:
      type: ClusterIP
      ports:
        - name: http
          port: 8087
          targetPort: 8087
    env:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    probes:
      httpPath: /actuator/health
      httpPort: 8087

  - name: api-gateway
    enabled: true
    image: edop/api-gateway:dev
    replicas: 1
    containerPorts:
      - name: http
        containerPort: 8080
    service:
      type: NodePort
      ports:
        - name: http
          port: 8080
          targetPort: 8080
          nodePort: 30080
    env:
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8083
      INVENTORY_SERVICE_URL: http://inventory-service:8084
      ORDER_SERVICE_URL: http://order-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    envFromSecrets:
      - name: api-gateway
        optional: true
    probes:
      httpPath: /actuator/health
      httpPort: 8080

ingress:
  enabled: false
  className: nginx
  host: edop.local
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.3"
  tls:
    enabled: false
    secretName: edop-gateway-tls


