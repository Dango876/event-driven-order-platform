services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    container_name: edop-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
      - --pandaproxy-addr
      - INTERNAL://0.0.0.0:8082,EXTERNAL://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - INTERNAL://redpanda:8082,EXTERNAL://localhost:18082
    ports:
      - "9092:9092"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: edop-schema-registry
    depends_on:
      - redpanda
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://redpanda:29092
    ports:
      - "8085:8081"

  postgres-auth:
    image: postgres:15-alpine
    container_name: edop-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5433:5432"
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-user:
    image: postgres:15-alpine
    container_name: edop-postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    ports:
      - "5434:5432"
    volumes:
      - pg-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-inventory:
    image: postgres:15-alpine
    container_name: edop-postgres-inventory
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    ports:
      - "5435:5432"
    volumes:
      - pg-inventory-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-order:
    image: postgres:15-alpine
    container_name: edop-postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "5436:5432"
    volumes:
      - pg-order-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: edop-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: edop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: edop-prometheus
    depends_on:
      - alertmanager
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: edop-alertmanager
    depends_on:
      - alert-webhook-sink
    environment:
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-http://alert-webhook-sink:8080/alerts}
      ALERT_ONCALL_WEBHOOK_URL: ${ALERT_ONCALL_WEBHOOK_URL:-http://alert-webhook-sink:8080/alerts}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed -e "s|__ALERT_WEBHOOK_URL__|$${ALERT_WEBHOOK_URL}|g" -e "s|__ALERT_ONCALL_WEBHOOK_URL__|$${ALERT_ONCALL_WEBHOOK_URL}|g" /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - ./infra/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"

  alert-webhook-sink:
    image: mendhak/http-https-echo:34
    container_name: edop-alert-webhook-sink
    ports:
      - "8088:8080"

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    container_name: edop-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: edop-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:3.1.1
    container_name: edop-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.1.1
    container_name: edop-promtail
    depends_on:
      - loki
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./.logs:/var/log/edop:ro

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: edop-auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
      redpanda:
        condition: service_started
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      AUTH_BASE_URL: http://auth-service:8081
      LOGGING_FILE_NAME: /var/log/edop/auth-service.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8081:8081"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: edop-user-service
    depends_on:
      postgres-user:
        condition: service_healthy
      redpanda:
        condition: service_started
      schema-registry:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres-user:5432/user_db
      DB_USERNAME: user_user
      DB_PASSWORD: user_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      LOGGING_FILE_NAME: /var/log/edop/user-service.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8082:8082"

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: edop-product-service
    depends_on:
      mongodb:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      MONGODB_URI: mongodb://mongodb:27017/product_db
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      LOGGING_FILE_NAME: /var/log/edop/product-service.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8083:8083"

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: edop-inventory-service
    depends_on:
      postgres-inventory:
        condition: service_healthy
      redpanda:
        condition: service_started
      schema-registry:
        condition: service_started
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres-inventory:5432/inventory_db
      DB_USERNAME: inventory_user
      DB_PASSWORD: inventory_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      GRPC_SERVER_PORT: 9091
      LOGGING_FILE_NAME: /var/log/edop/inventory-service.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8084:8084"
      - "9091:9091"

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: edop-order-service
    depends_on:
      postgres-order:
        condition: service_healthy
      redpanda:
        condition: service_started
      schema-registry:
        condition: service_started
      inventory-service:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres-order:5432/order_db
      DB_USERNAME: order_user
      DB_PASSWORD: order_pass
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      INVENTORY_GRPC_HOST: inventory-service
      INVENTORY_GRPC_PORT: 9091
      LOGGING_FILE_NAME: /var/log/edop/order-service.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8086:8086"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: edop-notification-service
    depends_on:
      redpanda:
        condition: service_started
      schema-registry:
        condition: service_started
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      LOGGING_FILE_NAME: /var/log/edop/notification-service.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8087:8087"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: edop-api-gateway
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
      notification-service:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      PRODUCT_SERVICE_URL: http://product-service:8083
      INVENTORY_SERVICE_URL: http://inventory-service:8084
      ORDER_SERVICE_URL: http://order-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      LOGGING_FILE_NAME: /var/log/edop/api-gateway.app.log
    volumes:
      - ./.logs:/var/log/edop
    ports:
      - "8080:8080"

volumes:
  redpanda-data:
  pg-auth-data:
  pg-user-data:
  pg-inventory-data:
  pg-order-data:
  mongo-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  alertmanager-data:
